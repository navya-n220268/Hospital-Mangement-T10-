<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications — Sanjeevani Patient Portal</title>
  <link rel="stylesheet" href="/Hospital-Mangement-T10-/assets/css/portal.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .notif-item {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 16px 0; border-bottom: 1px solid var(--gray-100);
    }
    .notif-item:last-child { border-bottom: none; }
    .notif-item.unread { background: var(--blue-50); padding-left: 12px; padding-right: 12px; border-radius: var(--radius-sm); border-bottom: none; margin-bottom: 8px; }
    .notif-icon {
      width: 40px; height: 40px; border-radius: 12px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 1rem;
    }
    .notif-icon.reschedule  { background: #d1fae5; color: #059669; }
    .notif-icon.emergency   { background: #fee2e2; color: #dc2626; }
    .notif-icon.prescription { background: var(--blue-100); color: var(--blue-600); }
    .notif-icon.unavailability { background: #fef3c7; color: #d97706; }
    .notif-icon.default     { background: var(--gray-100); color: var(--gray-500); }
    .notif-body { flex: 1; min-width: 0; }
    .notif-msg  { font-size: 14px; color: var(--gray-700); line-height: 1.55; }
    .notif-item.unread .notif-msg { color: var(--gray-900); font-weight: 500; }
    .notif-time { font-size: 12px; color: var(--gray-400); margin-top: 4px; }
    .unread-dot { width: 8px; height: 8px; background: var(--blue-600); border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
    .filter-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-tab {
      padding: 7px 16px; border-radius: 99px; font-size: 13px; font-weight: 600; cursor: pointer;
      border: 1.5px solid var(--gray-200); background: white; color: var(--gray-600); transition: all .2s;
    }
    .filter-tab.active { background: var(--blue-600); color: white; border-color: var(--blue-600); }
    .mark-all-btn {
      background: var(--gray-100); border: 1px solid var(--gray-200); color: var(--gray-700);
      padding: 7px 14px; border-radius: 8px; font-size: 12.5px; cursor: pointer;
      font-family: var(--font); font-weight: 600; transition: all .2s;
    }
    .mark-all-btn:hover { background: var(--gray-200); }
  </style>
</head>
<body>
<div class="portal-wrap">
  <aside class="sidebar"></aside>
  <div class="sidebar-overlay"></div>
  <div class="main-area">
    <div class="topbar"></div>
    <div class="page-content">

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
        <div>
          <h2 style="font-size:1.2rem;font-weight:800;color:var(--gray-900);">🔔 Notifications</h2>
          <p style="font-size:13px;color:var(--gray-500);margin-top:3px;" id="notifCountText">Loading...</p>
        </div>
        <button class="mark-all-btn" onclick="markAllRead()"><i class="fas fa-check-double"></i> Mark All Read</button>
      </div>

      <div class="filter-tabs">
        <button class="filter-tab active" onclick="applyFilter('all',this)">All</button>
        <button class="filter-tab" onclick="applyFilter('unread',this)">Unread</button>
        <button class="filter-tab" onclick="applyFilter('prescription',this)">Prescriptions</button>
        <button class="filter-tab" onclick="applyFilter('reschedule',this)">Reschedules</button>
        <button class="filter-tab" onclick="applyFilter('unavailability',this)">Unavailability</button>
      </div>

      <div class="card">
        <div id="notifList" class="card-body" style="padding:0 22px;">
          <div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Loading...</p></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="/Hospital-Mangement-T10-/assets/js/portal.js"></script>
<script>
  let allNotifications = [], currentFilter = 'all';

  document.addEventListener('DOMContentLoaded', () => {
    initPortal('notifications', 'Notifications', 'Your activity feed').then(user => {
      if (user) { loadPatientNotifBadge(); loadNotifications(); }
    });
  });

  async function loadNotifications() {
    try {
      const res  = await fetch('/Hospital-Mangement-T10-/backend/patient/get_notifications.php');
      const data = await res.json();
      if (!data.success) throw new Error(data.message);
      allNotifications = data.notifications || [];
      render(allNotifications);
    } catch(e) {
      document.getElementById('notifList').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>${e.message}</p></div>`;
    }
  }

  function applyFilter(type, btn) {
    currentFilter = type;
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = type === 'all' ? allNotifications
      : type === 'unread' ? allNotifications.filter(n => n.status === 'unread')
      : allNotifications.filter(n => n.type === type);
    render(filtered);
  }

  function render(list) {
    const el = document.getElementById('notifList');
    const unread = allNotifications.filter(n => n.status === 'unread').length;
    document.getElementById('notifCountText').textContent = `${unread} unread · ${allNotifications.length} total`;

    if (!list.length) {
      el.innerHTML = '<div class="empty-state"><i class="fas fa-bell" style="font-size:2rem"></i><p>No notifications here.</p></div>';
      return;
    }

    const iconMap = {
      reschedule:    { cls: 'reschedule',    icon: 'fa-calendar-check' },
      emergency:     { cls: 'emergency',     icon: 'fa-ambulance' },
      prescription:  { cls: 'prescription',  icon: 'fa-file-medical' },
      unavailability:{ cls: 'unavailability',icon: 'fa-calendar-times'},
    };

    el.innerHTML = '<div style="padding:6px 0;">' + list.map(n => {
      const meta = iconMap[n.type] || { cls: 'default', icon: 'fa-bell' };
      const time = n.createdAt ? new Date(n.createdAt).toLocaleString('en-IN', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
      return `
        <div class="notif-item ${n.status === 'unread' ? 'unread' : ''}" id="ni-${n.id}">
          ${n.status === 'unread' ? '<div class="unread-dot"></div>' : '<div style="width:8px;flex-shrink:0"></div>'}
          <div class="notif-icon ${meta.cls}"><i class="fas ${meta.icon}"></i></div>
          <div class="notif-body">
            <div class="notif-msg">${n.message}</div>
            <div class="notif-time">${time}</div>
          </div>
          ${n.status === 'unread' ? `<button onclick="markRead('${n.id}')"
            style="flex-shrink:0;background:var(--blue-50);border:1px solid var(--blue-100);color:var(--blue-700);padding:5px 11px;border-radius:7px;font-size:12px;cursor:pointer;font-family:var(--font);">
            Mark Read</button>` : ''}
        </div>`;
    }).join('') + '</div>';
  }

  async function markRead(id) {
    await fetch('/Hospital-Mangement-T10-/backend/shared/mark_notification_read.php', {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({id})
    });
    const n = allNotifications.find(x => x.id === id);
    if (n) n.status = 'read';
    applyFilter(currentFilter, document.querySelector(`.filter-tab.active`));
    loadPatientNotifBadge();
  }

  async function markAllRead() {
    const unread = allNotifications.filter(n => n.status === 'unread');
    await Promise.all(unread.map(n =>
      fetch('/Hospital-Mangement-T10-/backend/shared/mark_notification_read.php', {
        method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({id: n.id})
      })
    ));
    allNotifications.forEach(n => n.status = 'read');
    render(allNotifications);
    loadPatientNotifBadge();
  }
</script>
</body>
</html>
