<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Medical Records — Sanjeevani</title>
<meta name="description" content="View your past prescriptions from doctors."/>
<link rel="stylesheet" href="/Hospital-Mangement-T10-/assets/css/portal.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
  .card {
    background: white; border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm); border: 1px solid var(--gray-200);
    overflow: hidden;
  }
  .card-header {
    padding: 20px 24px; border-bottom: 1px solid var(--gray-200);
    background: var(--gray-50);
  }
  .card-header h2 { font-size: 1.1rem; color: var(--gray-900); display: flex; align-items: center; gap: 8px; }
  
  .table-responsive { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 800px; }
  th {
    text-align: left; padding: 14px 20px; font-size: .8rem; font-weight: 600;
    color: var(--gray-500); text-transform: uppercase; letter-spacing: .05em;
    border-bottom: 2px solid var(--gray-200); background: white; white-space: nowrap;
  }
  td {
    padding: 16px 20px; border-bottom: 1px solid var(--gray-100);
    font-size: .9rem; color: var(--gray-800); vertical-align: top;
  }
  tbody tr:hover { background: var(--blue-50); }
  
  .med-list { list-style: none; padding: 0; margin: 0; }
  .med-list li { margin-bottom: 4px; font-size: .85rem; }
  .med-name { font-weight: 600; color: var(--blue-700); }
  .med-detail { color: var(--gray-500); font-size: .8rem; }
  
  .notes-text { font-size: .85rem; color: var(--gray-600); white-space: pre-wrap; line-height: 1.4; max-width: 300px; }
  
  .empty-state { text-align: center; padding: 60px 20px; color: var(--gray-500); }
  .empty-state i { font-size: 3rem; color: var(--gray-300); margin-bottom: 16px; display: block; }
  .empty-state h3 { font-size: 1.1rem; color: var(--gray-700); margin-bottom: 8px; }
</style>
</head>
<body>
<div class="portal-wrap">
  <aside class="sidebar"></aside>
  <div class="sidebar-overlay"></div>
  <div class="main-area">
    <div class="topbar"></div>
    <div class="page-content">

      <div class="card anim-fade-up">
        <div class="card-header">
          <h2><i class="fas fa-file-prescription" style="color:var(--blue-600)"></i> Prescription History</h2>
        </div>
        
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>Doctor Name</th>
                <th>Department</th>
                <th>Diagnosis</th>
                <th>Medicines</th>
                <th>Notes</th>
                <th>Prescription Date</th>
              </tr>
            </thead>
            <tbody id="prescriptionsTableBody">
              <tr>
                <td colspan="6" style="text-align:center;padding:40px;color:var(--gray-500)">
                  <i class="fas fa-spinner fa-spin"></i> Loading prescriptions...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="/Hospital-Mangement-T10-/assets/js/portal.js"></script>
<script>
async function loadPrescriptions() {
  const tbody = document.getElementById('prescriptionsTableBody');
  
  try {
    const res = await fetch('/Hospital-Mangement-T10-/backend/patient/get_patient_medical_records.php');
    const data = await res.json();
    
    if (!data.success) throw new Error(data.message);
    
    if (data.records.length === 0) {
      tbody.innerHTML = `
        <tr>
          <td colspan="6">
            <div class="empty-state">
              <i class="fas fa-folder-open"></i>
              <h3>No Prescriptions Found</h3>
              <p>You have no prescription records issued by doctors yet.</p>
            </div>
          </td>
        </tr>`;
      return;
    }
    
    let html = '';
    
    data.records.forEach(record => {
      // Format Medicines
      let medHtml = '<ul class="med-list">';
      if (record.medicines && record.medicines.length > 0) {
        record.medicines.forEach(m => {
          medHtml += `<li><span class="med-name">${m.name || m}</span> <span class="med-detail">(${[m.strength, m.frequency, m.duration].filter(Boolean).join(', ')})</span></li>`;
        });
      } else {
        medHtml += `<li>—</li>`;
      }
      medHtml += '</ul>';
      
      // Format Date
      let dateStr = record.prescription_date || record.created_at || '—';
      if (dateStr !== '—') {
        try {
          dateStr = new Date(dateStr).toLocaleDateString('en-IN', { day:'2-digit', month:'long', year:'numeric' });
        } catch(e) {}
      }

      const doctorName = 'Dr. ' + (record.doctor_name || '').replace(/^Dr\.?\s*/i, '');
      const department = record.department || 'General';
      const diagnosis  = record.diagnosis || '—';
      const notes      = record.notes || '—';

      html += `
        <tr>
          <td style="font-weight:600;color:var(--gray-900)">${doctorName}</td>
          <td>${department}</td>
          <td style="font-weight:600">${diagnosis}</td>
          <td>${medHtml}</td>
          <td><div class="notes-text">${notes}</div></td>
          <td>${dateStr}</td>
        </tr>
      `;
    });
    
    tbody.innerHTML = html;
    
  } catch (err) {
    tbody.innerHTML = `
      <tr>
        <td colspan="6" style="text-align:center;padding:40px;color:var(--red-600)">
          <i class="fas fa-exclamation-circle"></i> Failed to load prescriptions. ${err.message}
        </td>
      </tr>`;
  }
}

initPortal('medical-records', 'Medical Records', 'Your prescription history')
  .then(user => {
    if (user) loadPrescriptions();
  });
</script>
</body>
</html>
