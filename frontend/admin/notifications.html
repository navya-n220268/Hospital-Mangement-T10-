<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications — Sanjeevani Admin</title>
  <link rel="stylesheet" href="/Hospital-Mangement-T10-/assets/css/Sanjeevani.css?v=1774423805">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .notif-item {
      display: flex; align-items: flex-start; gap: 16px;
      padding: 18px 24px; border-bottom: 1px solid var(--border);
      transition: background 0.2s; cursor: pointer;
    }
    .notif-item:last-child { border-bottom: none; }
    .notif-item:hover { background: var(--bg); }
    .notif-item.unread { background: var(--primary-light); }
    .notif-item.unread:hover { background: #d8eaf8; }
    .notif-icon {
      width: 42px; height: 42px; border-radius: 12px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
    }
    .notif-icon.doctor_registration { background: #e8f2fd; color: var(--primary); }
    .notif-icon.leave_request       { background: var(--warning-light); color: var(--warning); }
    .notif-icon.reschedule          { background: var(--accent-light); color: var(--accent); }
    .notif-icon.emergency           { background: var(--danger-light); color: var(--danger); }
    .notif-body { flex: 1; min-width: 0; }
    .notif-msg  { font-size: 14.5px; color: var(--text-primary); font-weight: 500; line-height: 1.5; }
    .notif-item.unread .notif-msg { font-weight: 600; }
    .notif-meta { font-size: 12.5px; color: var(--text-muted); margin-top: 4px; }
    .notif-mark { margin-left: auto; flex-shrink: 0; }
    .mark-btn {
      background: white; border: 1.5px solid var(--border); border-radius: 8px;
      padding: 5px 12px; font-size: 12.5px; color: var(--text-secondary);
      cursor: pointer; font-family: var(--font); font-weight: 600; transition: all 0.2s;
    }
    .mark-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
    .filter-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .filter-tab {
      padding: 7px 18px; border-radius: 20px; border: 1.5px solid var(--border);
      font-size: 13.5px; font-weight: 600; cursor: pointer; background: white;
      color: var(--text-secondary); font-family: var(--font); transition: all 0.2s;
    }
    .filter-tab.active { background: var(--primary); border-color: var(--primary); color: white; }
  </style>
  <script>
    (async function () {
      const res = await fetch('/Hospital-Mangement-T10-/backend/patient/get_user.php');
      const data = await res.json();
      if (!data.success || data.user.role !== 'admin') {
        window.location.href = '/Hospital-Mangement-T10-/frontend/auth/login.html';
      }
    })();
  </script>
</head>
<body>
  <aside class="sidebar"></aside>
  <div class="sb-overlay"></div>

  <div class="main">
    <header class="topbar"></header>

    <div class="content">
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="setFilter('all', this)">All</button>
        <button class="filter-tab" onclick="setFilter('unread', this)">Unread</button>
        <button class="filter-tab" onclick="setFilter('doctor_registration', this)">Doctor Registrations</button>
        <button class="filter-tab" onclick="setFilter('leave_request', this)">Leave Requests</button>
      </div>

      <div class="card animate-in">
        <div class="card-header">
          <div>
            <div class="card-title">All Notifications</div>
            <div class="card-subtitle" id="notifCount">Loading...</div>
          </div>
        </div>
        <div id="notifList">
          <div style="text-align:center;padding:48px;color:var(--text-muted)"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/Hospital-Mangement-T10-/assets/js/admin.js?v=1774423805"></script>
  <script>
    let allNotifications = [];
    let currentFilter = 'all';

    const ICONS = {
      doctor_registration: { icon: 'fa-user-md',         label: 'Doctor Registration' },
      leave_request:       { icon: 'fa-calendar-minus',  label: 'Leave Request' },
      reschedule:          { icon: 'fa-calendar-check',  label: 'Reschedule' },
      emergency:           { icon: 'fa-ambulance',       label: 'Emergency' },
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await buildAdminPortal('notifications', 'Notifications', 'Manage system alerts and requests');
      loadAdminNotifBadge();
      loadNotifications();
    });

    async function loadNotifications() {
      try {
        const res  = await fetch('/Hospital-Mangement-T10-/backend/admin/get_notifications.php');
        const data = await res.json();
        if (!data.success) throw new Error(data.message);
        allNotifications = data.notifications || [];
        render(allNotifications);
      } catch (e) {
        document.getElementById('notifList').innerHTML =
          `<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-title">Error loading notifications</div><div class="empty-state-text">${e.message}</div></div>`;
      }
    }

    function render(list) {
      const el = document.getElementById('notifList');
      document.getElementById('notifCount').textContent = `${list.filter(n=>n.status==='unread').length} unread · ${list.length} total`;
      if (!list.length) {
        el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🔔</div><div class="empty-state-title">No notifications</div><div class="empty-state-text">You're all caught up!</div></div>`;
        return;
      }
      el.innerHTML = list.map(n => {
        const meta = ICONS[n.type] || { icon: 'fa-bell', label: n.type };
        const time = n.createdAt ? new Date(n.createdAt).toLocaleString('en-IN') : '';
        return `
          <div class="notif-item ${n.status === 'unread' ? 'unread' : ''}" id="notif-${n.id}">
            <div class="notif-icon ${n.type}"><i class="fas ${meta.icon}"></i></div>
            <div class="notif-body">
              <div class="notif-msg">${n.message}</div>
              <div class="notif-meta"><span class="badge badge-pending" style="font-size:11px;">${meta.label}</span> &nbsp;${time}</div>
            </div>
            ${n.status === 'unread' ? `<div class="notif-mark"><button class="mark-btn" onclick="markRead('${n.id}')"><i class="fas fa-check"></i> Mark Read</button></div>` : ''}
          </div>`;
      }).join('');
    }

    function setFilter(f, btn) {
      document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = f;
      const filtered = f === 'all' ? allNotifications :
                       f === 'unread' ? allNotifications.filter(n => n.status === 'unread') :
                       allNotifications.filter(n => n.type === f);
      render(filtered);
    }

    async function markRead(id) {
      await fetch('/Hospital-Mangement-T10-/backend/shared/mark_notification_read.php', {
        method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({id})
      });
      const n = allNotifications.find(x => x.id === id);
      if (n) n.status = 'read';
      const el = document.getElementById(`notif-${id}`);
      if (el) { el.classList.remove('unread'); el.querySelector('.notif-mark')?.remove(); }
      document.getElementById('notifCount').textContent = `${allNotifications.filter(n=>n.status==='unread').length} unread · ${allNotifications.length} total`;
    }

    async function markAllRead() {
      const unread = allNotifications.filter(n => n.status === 'unread');
      await Promise.all(unread.map(n =>
        fetch('/Hospital-Mangement-T10-/backend/shared/mark_notification_read.php', {
          method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({id: n.id})
        })
      ));
      allNotifications.forEach(n => n.status = 'read');
      render(currentFilter === 'all' ? allNotifications : allNotifications.filter(n => currentFilter === 'unread' ? false : n.type === currentFilter));
    }
  </script>
</body>
</html>
