<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="refresh" content="0;url=doctor-messages.html"/>
<title>Redirecting…</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
.msg-layout {
  display:grid;
  grid-template-columns:300px 1fr;
  height:calc(100vh - 108px);
  background:white;
  border-radius:var(--r-xl);
  border:1px solid var(--border);
  overflow:hidden;
  box-shadow:var(--sh-md);
}

/* Conversation list */
.conv-list { border-right:1px solid var(--border); display:flex; flex-direction:column; }
.conv-search { padding:14px 16px; border-bottom:1px solid var(--border); }
.conv-search-inp { width:100%; padding:8px 12px 8px 34px; border-radius:99px; border:1.5px solid var(--border); background:var(--surface); font-family:var(--f-body); font-size:.8rem; color:var(--text-1); outline:none; }
.conv-search-inp:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(14,165,233,.1); }
.conv-search-wrap { position:relative; }
.conv-search-wrap i { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--text-4); font-size:.78rem; }
.conv-scroll { flex:1; overflow-y:auto; }

.conv-item {
  display:flex; gap:11px; padding:14px 16px;
  border-bottom:1px solid var(--surface);
  cursor:pointer; transition:all var(--dur) var(--ease);
}
.conv-item:hover { background:var(--surface); }
.conv-item.active { background:var(--blue-dim); border-left:3px solid var(--blue); }
.conv-avatar { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.78rem; font-weight:700; color:white; flex-shrink:0; position:relative; }
.conv-online { position:absolute; bottom:0; right:0; width:10px; height:10px; background:var(--green); border-radius:50%; border:2px solid white; }
.conv-info { flex:1; min-width:0; }
.conv-name { font-size:.82rem; font-weight:700; color:var(--text-1); margin-bottom:3px; }
.conv-preview { font-size:.73rem; color:var(--text-3); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.conv-meta { display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; }
.conv-time { font-size:.66rem; color:var(--text-4); }
.conv-unread { width:18px; height:18px; background:var(--blue); color:white; border-radius:50%; font-size:.62rem; font-weight:700; display:flex; align-items:center; justify-content:center; }

/* Chat area */
.chat-area { display:flex; flex-direction:column; }
.chat-header {
  padding:14px 20px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:13px; flex-shrink:0;
}
.chat-header-info { flex:1; }
.chat-header-info h3 { font-family:var(--f-display); font-size:.9rem; font-weight:700; color:var(--text-1); }
.chat-header-info p { font-size:.71rem; color:var(--text-3); }
.chat-header-actions { display:flex; gap:8px; }
.chat-messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:14px; background:#f8fafe; }

/* Messages */
.msg { max-width:68%; }
.msg.sent { align-self:flex-end; }
.msg.recv { align-self:flex-start; }
.msg-bubble {
  padding:11px 15px; border-radius:16px; font-size:.83rem; line-height:1.55;
  position:relative;
}
.msg.recv .msg-bubble { background:white; color:var(--text-2); border:1px solid var(--border); border-radius:4px 16px 16px 16px; box-shadow:var(--sh-xs); }
.msg.sent .msg-bubble { background:linear-gradient(135deg,var(--blue-dk),var(--blue)); color:white; border-radius:16px 4px 16px 16px; }
.msg-sender { font-size:.68rem; font-weight:700; color:var(--text-3); margin-bottom:4px; }
.msg.sent .msg-sender { text-align:right; }
.msg-time { font-size:.65rem; color:var(--text-4); margin-top:4px; }
.msg.sent .msg-time { text-align:right; color:rgba(255,255,255,.6); }
.msg-avatar { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.68rem; font-weight:700; color:white; flex-shrink:0; margin-bottom:4px; }
.msg-group { display:flex; flex-direction:column; }

/* System message */
.sys-msg { text-align:center; font-size:.7rem; color:var(--text-4); padding:6px 0; }
.sys-msg span { background:var(--surface-2); padding:3px 12px; border-radius:99px; }

/* Typing */
.typing-indicator { display:flex; gap:4px; align-items:center; padding:10px 14px; }
.typing-indicator span { width:6px; height:6px; background:var(--text-4); border-radius:50%; animation:typeBounce 1.2s infinite; }
.typing-indicator span:nth-child(2){ animation-delay:.2s; }
.typing-indicator span:nth-child(3){ animation-delay:.4s; }
@keyframes typeBounce { 0%,80%,100%{transform:scale(.8);opacity:.5} 40%{transform:scale(1);opacity:1} }

/* Input area */
.chat-input-area { padding:14px 18px; border-top:1px solid var(--border); display:flex; align-items:center; gap:10px; flex-shrink:0; }
.chat-input { flex:1; padding:10px 16px; border-radius:99px; border:1.5px solid var(--border); background:var(--surface); font-family:var(--f-body); font-size:.84rem; outline:none; transition:all var(--dur) var(--ease); }
.chat-input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(14,165,233,.1); background:white; }
.chat-send-btn { width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,var(--blue-dk),var(--blue)); color:white; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:.85rem; box-shadow:var(--sh-blue); transition:all var(--dur) var(--ease); flex-shrink:0; }
.chat-send-btn:hover { transform:scale(1.1); }
.chat-attach-btn { width:34px; height:34px; border-radius:50%; background:var(--surface); color:var(--text-3); border:1px solid var(--border); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:.82rem; transition:all var(--dur) var(--ease); flex-shrink:0; }
.chat-attach-btn:hover { background:var(--blue-dim); color:var(--blue); }

/* No chat selected */
.no-chat { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--text-4); text-align:center; }
.no-chat i { font-size:2.5rem; opacity:.3; margin-bottom:14px; }
.no-chat p { font-size:.85rem; }
</style>
</head>
<body>
<div class="portal-wrap">
  <aside class="sidebar"></aside>
  <div class="sb-overlay"></div>
  <div class="main-area">
    <div class="topbar"></div>
    <div class="page-content" style="padding-bottom:0">

      <div class="msg-layout afu">

        <!-- Conversation List -->
        <div class="conv-list">
          <div class="conv-search">
            <div class="conv-search-wrap">
              <i class="fas fa-search"></i>
              <input type="text" class="conv-search-inp" placeholder="Search patients..." oninput="filterConvs(this.value)"/>
            </div>
          </div>
          <div class="conv-scroll" id="convList"></div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
          <div class="no-chat">
            <i class="fas fa-comment-medical"></i>
            <p>Select a patient conversation to begin</p>
            <p style="font-size:.76rem;margin-top:4px">Messages are end-to-end encrypted</p>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
<script src="/Hospital-Mangement-T10-/assets/js/doctor.js?v=3"></script>
<script>
buildPortal('messages', 'Messages', 'Communicate securely with patients');

const conversations = [
  {
    id:1, name:'Priya Singh', initials:'PS', grad:'linear-gradient(135deg,#f093fb,#f5576c)',
    role:'Patient · MV-P-1002', online:true, unread:2, time:'10:42 AM',
    preview:'Doctor, I am still feeling the palpitations...',
    messages:[
      { from:'patient', text:'Good morning, Doctor. I wanted to update you on my symptoms.', time:'9:30 AM' },
      { from:'doctor', text:'Good morning, Priya. How are you feeling today?', time:'9:32 AM' },
      { from:'patient', text:'Still having some palpitations especially in the morning. The new medication helps a bit but not fully.', time:'9:35 AM' },
      { from:'doctor', text:'I see. The Verapamil might need a dosage adjustment. Can you log your pulse readings for the next 3 days and share with me?', time:'9:38 AM' },
      { from:'patient', text:'Yes, I will do that. Should I also keep note of the time and what I was doing?', time:'9:40 AM' },
      { from:'doctor', text:'Absolutely — that context is very helpful. Also avoid caffeine and monitor if stress triggers the episodes.', time:'9:43 AM' },
      { from:'patient', text:'Doctor, I am still feeling the palpitations even while resting now.', time:'10:42 AM' },
    ]
  },
  {
    id:2, name:'Rajiv Mehta', initials:'RM', grad:'linear-gradient(135deg,#667eea,#764ba2)',
    role:'Patient · MV-P-1001', online:true, unread:0, time:'Yesterday',
    preview:'Thank you Doctor, prescription received.',
    messages:[
      { from:'patient', text:'Hello Doctor, I picked up the medication from the pharmacy.', time:'Yesterday 4:10 PM' },
      { from:'doctor', text:'Great Rajiv. Remember to take Aspirin after meals and Metoprolol in the morning.', time:'Yesterday 4:15 PM' },
      { from:'patient', text:'Thank you Doctor, prescription received. See you next month.', time:'Yesterday 4:20 PM' },
    ]
  },
  {
    id:3, name:'Arun Kumar', initials:'AK', grad:'linear-gradient(135deg,#4facfe,#00f2fe)',
    role:'Patient · MV-P-1003', online:false, unread:1, time:'Yesterday',
    preview:'My BP reading this morning was 162/98...',
    messages:[
      { from:'patient', text:'Doctor, my home BP reading this morning was 162/98. Should I be worried?', time:'Yesterday 8:00 AM' },
      { from:'doctor', text:'That is elevated. Please avoid salt today and come in for a check if it stays above 160 tomorrow morning.', time:'Yesterday 10:30 AM' },
    ]
  },
  {
    id:4, name:'Neha Patel', initials:'NP', grad:'linear-gradient(135deg,#43e97b,#38f9d7)',
    role:'Patient · MV-P-1004', online:false, unread:0, time:'10 Mar',
    preview:'Appointment confirmed for next week.',
    messages:[
      { from:'patient', text:'I have booked my appointment for March 18th. See you then!', time:'10 Mar 3:00 PM' },
      { from:'doctor', text:'Perfect Neha. Please bring your echocardiogram report.', time:'10 Mar 3:15 PM' },
      { from:'patient', text:'Appointment confirmed for next week. Will do!', time:'10 Mar 3:18 PM' },
    ]
  },
  {
    id:5, name:'Hospital Admin', initials:'HA', grad:'linear-gradient(135deg,#667eea,#0ea5e9)',
    role:'Admin · Sanjeevani System', online:true, unread:1, time:'9:15 AM',
    preview:'Monthly report submission deadline today 5 PM.',
    messages:[
      { from:'patient', text:'Reminder: Monthly department report is due today by 5:00 PM. Please submit via the portal.', time:'9:15 AM' },
    ]
  },
];

let activeConv = null;

function renderConvList(list) {
  const el = document.getElementById('convList');
  el.innerHTML = list.map(c => `
    <div class="conv-item ${activeConv===c.id?'active':''}" onclick="openConv(${c.id})">
      <div class="conv-avatar" style="background:${c.grad}">
        ${c.initials}
        ${c.online ? '<div class="conv-online"></div>' : ''}
      </div>
      <div class="conv-info">
        <div class="conv-name">${c.name}</div>
        <div class="conv-preview">${c.preview}</div>
      </div>
      <div class="conv-meta">
        <span class="conv-time">${c.time}</span>
        ${c.unread ? `<span class="conv-unread">${c.unread}</span>` : ''}
      </div>
    </div>`).join('');
}

function openConv(id) {
  const conv = conversations.find(c => c.id === id);
  if (!conv) return;
  activeConv = id;
  conv.unread = 0;
  renderConvList(conversations);

  const chatArea = document.getElementById('chatArea');
  chatArea.innerHTML = `
    <div class="chat-header">
      <div class="conv-avatar" style="background:${conv.grad};width:38px;height:38px;font-size:.76rem;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:white;flex-shrink:0;position:relative">
        ${conv.initials}
        ${conv.online ? '<div class="conv-online"></div>' : ''}
      </div>
      <div class="chat-header-info">
        <h3>${conv.name}</h3>
        <p>${conv.role} · ${conv.online ? '<span style="color:var(--green)">● Online</span>' : '<span style="color:var(--text-4)">● Offline</span>'}</p>
      </div>
      <div class="chat-header-actions">

        <button class="btn btn-ghost btn-xs" onclick="showToast('Patient record opened')"><i class="fas fa-user"></i> Profile</button>
      </div>
    </div>
    <div class="chat-messages" id="messages">
      <div class="sys-msg"><span>Conversation started · Encrypted</span></div>
      ${conv.messages.map(m => renderMsg(m, conv)).join('')}
    </div>
    <div class="chat-input-area">
      <button class="chat-attach-btn" onclick="showToast('File picker opening...')"><i class="fas fa-paperclip"></i></button>
      <input type="text" class="chat-input" id="chatInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMsg(${id})"/>
      <button class="chat-attach-btn" onclick="showToast('Templates loading...')"><i class="fas fa-notes-medical"></i></button>
      <button class="chat-send-btn" onclick="sendMsg(${id})"><i class="fas fa-paper-plane"></i></button>
    </div>`;

  scrollToBottom();
}

function renderMsg(m, conv) {
  const isDoctor = m.from === 'doctor';
  return `
    <div class="msg ${isDoctor?'sent':'recv'}">
      <div class="msg-sender">\${isDoctor ? 'Dr. ' + (window.currentUser ? window.currentUser.name : 'Unknown') : conv.name}</div>
      <div class="msg-bubble">\${m.text}</div>
      <div class="msg-time">${m.time}${isDoctor ? ' <i class="fas fa-check-double" style="margin-left:4px;font-size:.6rem"></i>' : ''}</div>
    </div>`;
}

function sendMsg(convId) {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  const conv = conversations.find(c => c.id === convId);
  const msg = { from:'doctor', text, time:new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}) };
  conv.messages.push(msg);
  const msgList = document.getElementById('messages');
  const div = document.createElement('div');
  div.innerHTML = renderMsg(msg, conv);
  msgList.appendChild(div.firstElementChild);
  input.value = '';
  scrollToBottom();
  conv.preview = text;
  renderConvList(conversations);
}

function scrollToBottom() {
  const el = document.getElementById('messages');
  if (el) el.scrollTop = el.scrollHeight;
}

function filterConvs(q) {
  const lo = q.toLowerCase();
  renderConvList(q ? conversations.filter(c => c.name.toLowerCase().includes(lo)) : conversations);
}

renderConvList(conversations);
// Auto-open first conversation
openConv(1);
</script>
</body>
</html>
